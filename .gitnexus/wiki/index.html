var PAGES = {"content-data":"# Content Data\n\n## Content Data Module\n\n### Overview\nThe **Content Data** module (`data/content.js`) serves as the single source of truth for all editable site content. It centralizes branding assets, inspiration projects, and client logos, allowing the front‑end pages (`index.html`, `inspirations.html`) to reference a consistent data structure without hard‑coding values.\n\n### Data Structure\nThe exported constant `HIEZY` contains three top‑level sections:\n\n| Section | Purpose | Key Fields |\n|---------|---------|------------|\n| `brand` | Global brand identifiers | `logo`, `favicon`, `logoAlt`, `name` |\n| `inspirations` | Catalog of design inspirations, grouped by category (`landing`, `ecommerce`, `dashboards`) | Each project includes `title`, `description`, `tags`, `img1`, `img2`, `pdf` |\n| `clients` | Marquee strip of client logos | Each entry has `name` and `src` (image path) |\n\nAll paths follow the folder rule:\n- **Thumbnails**: `assets/inspirations/<category>/<filename>.png`\n- **PDFs**: `assets/inspirations/<category>/<filename>.pdf`\n- **Brand assets**: `assets/images/brand/...`\n- **Client logos**: `assets/images/clients/...`\n\n### Key Components\n- **`HIEZY.brand`** – Provides logo, favicon, alt text, and brand name for header/footer components.\n- **`HIEZY.inspirations.<category>`** – Arrays of project objects used by the inspiration gallery component to render cards, images, and optional PDF downloads.\n- **`HIEZY.clients`** – Array of logo objects consumed by the client marquee component to display partner logos.\n\n### Usage\n1. **Adding/Editing Projects**  \n   - Insert a new object into the appropriate category array (`landing`, `ecommerce`, `dashboards`).  \n   - Populate `title`, `description`, `tags`, `img1`, `img2`, and optionally `pdf`.  \n   - Ensure image paths adhere to the folder rule.\n\n2. **Modifying Brand Assets**  \n   - Update `logo`, `favicon`, `logoAlt`, or `name` in `HIEZY.brand`.  \n   - The UI components that reference these values will automatically reflect the changes.\n\n3. **Updating Client Logos**  \n   - Add, remove, or replace objects in the `clients` array.  \n   - The marquee component iterates over this array to render each logo.\n\n### Integration Points\n- **Inspiration Pages** (`inspirations.html`) import the `HIEZY` object to populate project cards dynamically.  \n- **Landing Page** (`index.html`) reads `HIEZY.brand` for header branding and `HIEZY.clients` for the client strip.  \n- No runtime dependencies or function calls are required; the module is purely data‑driven.\n\n### Extending the Module- To support additional categories, add a new top‑level key under `inspirations` and populate it with project objects following the same schema.  \n- For multilingual content, consider adding a `translations` sub‑object within each project and update consuming components accordingly.\n\n### Example Code Snippet\n```javascript\n// Access a specific inspiration project\nconst tourismProject = HIEZY.inspirations.landing[0];\nconsole.log(tourismProject.title); // \"Tourism Website\"\n\n// Retrieve a client logoconst firstClientLogo = HIEZY.clients[0].src;\n```\n\n### Architecture Diagram\n```mermaid\nflowchart TD\n    A[HIEZY Data Module] -->|provides| B[Brand Assets]\n    A -->|provides| C[Inspiration Projects]\n    A -->|provides| D[Client Logos]\n    B -->|used by| E[Header/Footer Components]\n    C -->|used by| F[Inspiration Gallery]\n    D -->|used by| G[Client Marquee]\n```\n\n*The diagram illustrates the one‑way data flow from the central `HIEZY` object to the various UI components that consume it.*","overview":"# HIEZY_Web_Solutions_—_Affordable_Websites_and_Softwares_for_Small_to_Medium_Businesses — Wiki\n\n# HIEZY_Web_Solutions — Affordable Websites and Softwares for Small to Medium Businesses\n\nWelcome to the HIEZY Web Solutions repository. This is the single source of truth for our affordable, template‑driven websites aimed at small and medium businesses. The project is organized into focused modules that separate content, presentation, and configuration, enabling fast updates and consistent branding across static pages.\n\n## High-Level Architecture\n\nThe site is built from a small set of core modules that work together to render pages with minimal runtime complexity:\n\n```mermaid\ngraph TD\n    data/content --> ui/components\n    data/content --> pages/static\n    config/site --> pages/static\n    ui/components --> pages/static\n    pages/static --> web/server\n    web/server --> infra/deploy\n    infra/deploy --> data/content\n    infra/deploy --> config/site\n    ui/components --> ui/animations\n    ui/animations --> pages/static\n```\n\n## Modules and Key Flows\n\n### [Content Data](data/content.md)\nThe **Content Data** module (`data/content.js`) is the single source of truth for all editable site content. It provides a global `HIEZY` object with `brand`, `inspirations`, and `clients`, ensuring consistent references across pages without hard‑coded values. Use it to add projects, update branding, or manage client logos.\n\n### [Static Pages](pages/static.md)\nThe **Static Pages** module (`index.html` and `inspirations.html`) delivers the public‑facing interface. It renders the home, services, and inspiration hub, and powers interactions such as preloader, navigation, mobile sheet, 3‑D tilt, video overlay, form wizard, scroll‑based progress, back‑to‑top, and scroll‑reveal animations. It consumes `HIEZY` for dynamic content and includes third‑party widgets.\n\n### [Site Configuration](config/site.md)\nThe **Site Configuration** module defines how search engines and crawlers interact with the site via `robots.txt` and `sitemap.xml`. These static assets are served directly by the web server and are essential for discoverability and indexing.\n\n### UI Components and Animations\nReusable UI components and animation modules keep the visual language consistent. They are wired into the static pages and driven by data from the Content Data module, enabling dynamic galleries, branded headers, and client marquees with minimal JavaScript.\n\n## Setup and Contribution\n\nTo work with the repository:\n- Ensure file paths follow the established folder rules for images, PDFs, and brand assets.\n- Update `data/content.js` to modify content; the static pages will reflect changes automatically.\n- Extend categories in the Content Data module by adding new top‑level keys and following the existing schema.\n\nThis structure keeps the codebase approachable while supporting clear navigation paths for designers and developers.","site-configuration":"# Site Configuration\n\n# Site Configuration Module\n\nThe **Site Configuration** module consists of two static assets that inform search engines and crawlers about how the site should be indexed:\n\n| Asset | Path | Purpose |\n|-------|------|---------|\n| `robots.txt` | `/robots.txt` | Declares crawl permissions and provides the location of the sitemap. |\n| `sitemap.xml` | `/sitemap.xml` | Lists the publicly available URLs, their last modification dates, change frequency hints, and priority values for search engine indexing. |\n\nThese files are served directly by the web server (e.g., Nginx, Apache, or a CDN edge) and are **not** processed by any application code. Consequently, the module has no runtime dependencies, internal calls, or execution flow.\n\n---\n\n## 1. `robots.txt`\n\n```text\nUser-agent: *\nAllow: /\n\n# Sitemap link for Search Engines\nSitemap: https://hiezy.com/sitemap.xml\n```\n\n### Key directives\n- **`User-agent: *`** – Applies to all crawlers.\n- **`Allow: /`** – Grants permission to crawl the entire site.\n- **`Sitemap:`** – Points crawlers to the `sitemap.xml` file, enabling them to discover the URLs listed there.\n\n### Maintenance notes\n- If new sections of the site become private, add `Disallow:` rules before the `Allow:` line.\n- When the sitemap URL changes (e.g., moving to a versioned path), update the `Sitemap:` line accordingly.\n\n---\n\n## 2. `sitemap.xml`\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n  <!-- Main Landing Page -->\n  <url>\n    <loc>https://hiezy.com/<\/loc>\n    <lastmod>2026-04-21<\/lastmod>\n    <changefreq>monthly<\/changefreq>\n    <priority>1.0<\/priority>\n  <\/url>\n\n  <!-- Inspirations Hub / Coming Soon -->\n  <url>\n    <loc>https://hiezy.com/inspirations.html<\/loc>\n    <lastmod>2026-04-21<\/lastmod>\n    <changefreq>monthly<\/changefreq>\n    <priority>0.8<\/priority>\n  <\/url>\n<\/urlset>\n```\n\n### Elements explained\n| Element | Description |\n|---------|-------------|\n| `<urlset>` | Root element; must include the sitemap namespace. |\n| `<url>` | Container for a single URL entry. |\n| `<loc>` | Fully qualified URL. |\n| `<lastmod>` | Date the resource was last changed (ISO 8601). |\n| `<changefreq>` | Hint to crawlers about how often the page changes (`always`, `hourly`, `daily`, `weekly`, `monthly`, `yearly`, `never`). |\n| `<priority>` | Relative priority (0.0 – 1.0) compared to other URLs on the same site. |\n\n### Adding new URLs\n1. Insert a new `<url>` block before the closing `<\/urlset>` tag.\n2. Populate the fields with accurate data:\n   - `loc` – absolute URL.\n   - `lastmod` – the date of the most recent content update.\n   - `changefreq` – choose the most realistic frequency.\n   - `priority` – higher for core pages, lower for ancillary content.\n\n### Automation considerations\n- The site currently uses a static file; if the URL set grows, consider generating `sitemap.xml` via a build script (e.g., a Node.js or Python script) that scans the output directory and writes the XML.\n- When automating, keep the same schema and ordering to avoid breaking existing SEO expectations.\n\n---\n\n## 3. Integration with the Rest of the Codebase\n\n- **Static serving**: The web server is configured to serve these files at the root (`/robots.txt`, `/sitemap.xml`). No application routes or middleware touch them.\n- **No runtime impact**: Because there are no imports, function calls, or event listeners, changes to these files do not require a rebuild of the application bundle.\n- **Search engine visibility**: Search engines read `robots.txt` first, then follow the `Sitemap:` URL to fetch `sitemap.xml`. Keeping these files up‑to‑date directly influences crawl efficiency and SEO ranking.\n\n---\n\n## 4. Deployment Checklist\n\n| ✅ | Item |\n|----|------|\n| ☐ | Verify that `robots.txt` contains the correct `Sitemap:` URL. |\n| ☐ | Confirm that all public URLs are listed in `sitemap.xml` with accurate `<lastmod>` dates. |\n| ☐ | Test that both files are reachable (`curl https://hiezy.com/robots.txt` and `curl https://hiezy.com/sitemap.xml`). |\n| ☐ | If using a CDN, purge the cache for these two paths after any change. |\n| ☐ | Run an online sitemap validator (e.g., Google Search Console) to catch XML schema errors. |\n\n---\n\n## 5. Future Enhancements (optional)\n\n- **Dynamic sitemap generation**: Hook into the build pipeline to auto‑populate `<url>` entries from a source‑of‑truth (e.g., a markdown content list or a CMS API).\n- **Multi‑language support**: Add `<xhtml:link rel=\"alternate\" hreflang=\"...\">` tags inside each `<url>` for localized pages.\n- **Granular crawl control**: Introduce `Disallow:` rules in `robots.txt` for admin or staging paths as the project expands.","static-pages":"# Static Pages\n\n# Static Pages Module (index.html & inspirations.html)\n\n## 1. Purpose\nThe **Static Pages** module provides the public‑facing website for *Hiezy Web Solutions*.  \nIt is a pure‑HTML/CSS/JS bundle that:\n\n* Renders the home, services, and contact sections.\n* Drives UI interactions (preloader, navigation, mobile sheet, 3‑D tilt, video overlay, form wizard, scroll‑based progress bar, back‑to‑top button, scroll‑reveal animations, and the Design Inspirations hub).\n* Pulls brand assets and dynamic content from `data/content.js` via the global `HIEZY` object.\n* Loads third‑party widgets (Google Translate, GTranslate, Aminos chat) **after** the preloader finishes.\n\nBecause the pages are static, there is no server‑side routing or API layer; all navigation is handled by hash anchors (`#home`, `#services`, `#contact`, etc.).\n\n---\n\n## 2. High‑Level Architecture\n\n```mermaid\nflowchart TD\n    A[HTML (index.html)] --> B[CSS (Tailwind + style.css)]\n    A --> C[JS Core]\n    C -->|preloader| P[Preloader Logic]\n    C -->|nav| N[IntersectionObserver + active‑underline]\n    C -->|mobile| M[Mobile Bottom Sheet]\n    C -->|tilt| T[Physics‑based 3D Tilt & Lift]\n    C -->|video| V[Intro Video Overlay]\n    C -->|inspirations| I[Design Inspirations Hub]\n    C -->|form| F[Quote Form Wizard]\n    C -->|progress| R[Perimeter Scroll Progress Bar]\n    C -->|back‑to‑top| BTT[Back‑to‑Top Button]\n    C -->|reveal| SR[Scroll‑Reveal (IntersectionObserver)]\n    C -->|third‑party| TP[Load GTranslate & Aminos after preloader]\n    style A fill:#f9f,stroke:#333,stroke-width:2px\n    style C fill:#bbf,stroke:#333,stroke-width:2px\n```\n\n*Only the JavaScript block (`<script>` tags) contains the runtime logic; the rest is declarative markup.*\n\n---\n\n## 3. Key Components\n\n### 3.1. Global Assets (loaded from `data/content.js`)\n```js\n// Example structure (actual file not shown)\nwindow.HIEZY = {\n  brand: {\n    logo:      \"assets/images/brand/hiezy-logo.png\",\n    logoAlt:   \"Hiezy Logo\",\n    favicon:   \"assets/images/brand/favicon.png\"\n  },\n  inspirations: {\n    landing: [{title, description, img1, img2, tags}, …],\n    ecommerce: [{…}],\n    dashboards: [{…}]\n  }\n};\n```\n* The script `data/content.js` is loaded **before** any UI code, allowing the page to inject logos, favicons, and the inspiration gallery data at runtime.\n\n### 3.2. Preloader (`#preloader`)\n* **Elements**: logo image, progress bar (`#preloader-bar`), knob (`#preloader-knob`), percentage text.\n* **Logic** (`preloader` IIFE):\n  1. Starts at **20 %** to give immediate feedback.\n  2. Tracks all `<img>` and `<video>` elements; each successful load increments `loadedAssets`.\n  3. `targetProgress = 20 + (loaded/total) * 75` → smooth LERP animation toward 95 % while assets load.\n  4. On `window.load` → `targetProgress = 100`; when the animation reaches ~99.5 % the preloader slides out (`transform: translateY(-100%)`).\n  5. After a short delay, **third‑party scripts** (GTranslate, Aminos chat) are injected.\n\n### 3.3. Header & Sticky Navigation\n* **HTML**: `<header>` with logo (`#nav-logo`) and three navigation links (`data-nav=\"home|services|contact\"`).\n* **JS** (`IntersectionObserver`):\n  * Observes the three main sections (`#home`, `#services`, `#contact`).\n  * Adds `active-underline` + `text-ink` to the link whose section has the highest intersection ratio.\n* **Accessibility**: `aria-controls`, `aria-expanded` on the mobile menu button.\n\n### 3.4. Mobile Bottom Sheet\n* **Elements**: `#mobileOverlay`, `#mobileSheet`, `#sheetHandle`, navigation links (`.sheet-link`).\n* **Open/Close**:\n  * `menuBtn` toggles the sheet (`translateY(0)` vs `translateY(100%)`).\n  * Overlay click, link click, or swipe‑down gesture (touch events on `#sheetHandle`) close the sheet.\n* **State**: `sheetOpen` boolean, body overflow locked while open.\n\n### 3.5. 3‑D Tilt & Lift Effects\n* **`setupTiltEffect(cardId, tiltIntensity, liftAmount)`** – attaches mousemove, mouseenter, mouseleave listeners to a card.\n  * Uses a physics‑based LERP loop (`requestAnimationFrame`) to smoothly interpolate rotation (`rotateX/Y`) and vertical lift (`translateY`).\n  * Applied to:\n    * `#tilt-card` (the “Most popular” service card) – `tiltIntensity = 10`, `liftAmount = -8`.\n    * `#hero-tilt-group` – lower intensity for the whole hero mock‑up.\n* **Side‑card lift** (`.js-lift-card`):\n  * Same LERP engine, but only vertical translation (`translateY(-8px)` on hover).\n\n### 3.6. Hero Video Overlay\n* **Elements**: `<video id=\"introVideo\">`, overlay div `#videoOverlay`, play button `#playIcon`.\n* **Behaviour**:\n  * Click overlay → `introVideo.play()` and hide overlay (`opacity-0`, `pointer-events:none`).\n  * Click video → pause and show overlay again.\n  * `ended` event resets the video (loads first frame) and restores overlay.\n\n### 3.7. Design Inspirations Hub\n* **Data source**: `HIEZY.inspirations` (categories: `landing`, `ecommerce`, `dashboards`).\n* **Controls**:\n  * Tab buttons (`.inspiration-tab`) call `switchInspiration(category)`.\n  * Carousel arrows inside the rendered content call `cycleProject(direction)`.\n* **Rendering** (`renderInspiration()`):\n  1. Adds an exit class (`inspiration-exit`) → CSS transition for fade out.\n  2. After 400 ms, replaces innerHTML of `#inspiration-content` with the new project markup.\n  3. Double `requestAnimationFrame` triggers the entrance transition.\n* **Initialisation**: runs on `DOMContentLoaded`, injects brand logos, sets up the container’s transition classes, and renders the first landing‑page project.\n\n### 3.8. Quote Form Wizard\n* **Structure**: two steps (`#step1`, `#step2`) with a step indicator (`#stepIndicator`) and progress dots (`#dot1`, `#dot2`).\n* **Validation**:\n  * Live validation on all inputs (`input`, `textarea`) – shows a green check icon when the field is valid.\n  * `nextBtn` validates required fields (`name`, `business`, `email`) before advancing.\n* **Navigation**:\n  * `nextBtn` → fades out step 1, fades in step 2, updates indicator and dot colours.\n  * `backBtn` → reverse transition.\n* **Submission** (`quoteForm.submit`):\n  1. Validates the goal textarea.\n  2. Shows a spinner on the submit button.\n  3. After a simulated 800 ms delay, builds a `mailto:` URL with all form values and redirects the browser.\n  4. Shows a success message (`#formMsg`) and hides the wizard UI.\n\n### 3.9. Perimeter Scroll Progress Bar\n* **Elements**: four thin divs (`#progress-top`, `#progress-right`, `#progress-bottom`, `#progress-left`) forming a rectangle around the viewport.\n* **Algorithm**:\n  1. Compute total perimeter `2*(W+H)`.\n  2. Map scroll percentage to a length along the perimeter.\n  3. Adjust the width/height of the four bars accordingly.\n* **Updates** on `scroll` and `resize` (passive listeners).\n\n### 3.10. Back‑to‑Top Button\n* **Visibility**: appears only when the user scrolls within **100 px of the page bottom** (`opacity-0` → `opacity-100`).\n* **Action**: smooth scroll to top on click.\n\n### 3.11. Scroll‑Reveal\n* Elements with class `reveal-init` (added by the script) are observed.\n* When intersecting (`threshold: 0.1`) the class `active-reveal` is added, triggering the CSS transition defined in `<style>` (fade‑in + translateY).\n\n### 3.12. Footer\n* Dynamically injects the current year (`#year`) and brand logos (`#footer-logo`).\n* Contains contact info, quick links, and a “Brands that trusted” marquee (cloned for seamless looping).\n\n---\n\n## 4. Interaction Flow Summary\n\n1. **Page Load**\n   * `data/content.js` → global `HIEZY`.\n   * Preloader starts at 20 %.\n   * Asset tracking begins; progress bar updates.\n2. **When all assets are loaded (`window.load`)**\n   * Preloader animates to 100 % → slides out.\n   * Third‑party scripts are injected.\n3. **User Navigation**\n   * Sticky header stays visible.\n   * IntersectionObserver updates active link.\n   * Mobile users can open the bottom sheet; swipe down to dismiss.\n4. **Hero Section**\n   * Mouse movement over `#hero-tilt-group` tilts the mock‑up.\n   * Click on the overlay plays/pauses the intro video.\n5. **Design Inspirations**\n   * Tab click → `switchInspiration()` → re‑render with exit/enter animation.\n   * Arrow click → `cycleProject()` → next/previous project in the same category.\n6. **Quote Form**\n   * Step 1 → validation → Step 2.\n   * Step 2 → validation → `mailto:` redirect.\n   * Success message displayed; form UI hidden
